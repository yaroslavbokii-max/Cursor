services:
  - type: web
    name: sticker-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py --webhook
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_ID
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: DATABRICKS_TOKEN
        sync: false
