<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Дашборд</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --green: #34d399;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    header { margin-bottom: 1.5rem; }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 0.35rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin: 0; }
    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .kpi {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 12px;
      padding: 1rem 1.1rem;
    }
    .kpi .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .kpi .value { font-size: 1.5rem; font-weight: 700; margin-top: 0.25rem; }
    .kpi .delta { font-size: 0.8rem; margin-top: 0.35rem; }
    .kpi .delta.up { color: var(--green); }
    .kpi .delta.down { color: #f87171; }
    .charts { display: grid; gap: 1rem; }
    @media (min-width: 720px) {
      .charts { grid-template-columns: 1.4fr 1fr; align-items: stretch; }
    }
    .panel {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 12px;
      padding: 1rem 1rem 0.5rem;
    }
    .panel h2 { font-size: 0.85rem; font-weight: 600; color: var(--muted); margin: 0 0 0.75rem; }
    .chart-box { position: relative; height: 220px; }
    .chart-box.tall { height: 260px; }
    footer { margin-top: 1.5rem; font-size: 0.8rem; color: var(--muted); }
    code { background: rgba(0,0,0,.35); padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.9em; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Дашборд</h1>
      <p class="sub" id="subtitle">
        Дані з <code>dashboard-data.json</code> (оновлюється скриптом / GitHub Actions + Databricks).
      </p>
    </header>

    <section class="kpis" aria-label="Ключові показники">
      <div class="kpi">
        <div class="label">Замовлення</div>
        <div class="value" id="kpi-orders">—</div>
        <div class="delta" id="kpi-orders-delta"></div>
      </div>
      <div class="kpi">
        <div class="label">GMV</div>
        <div class="value" id="kpi-gmv">—</div>
        <div class="delta" id="kpi-gmv-delta"></div>
      </div>
      <div class="kpi">
        <div class="label">Конверсія</div>
        <div class="value" id="kpi-conv">—</div>
        <div class="delta" id="kpi-conv-delta"></div>
      </div>
      <div class="kpi">
        <div class="label">NPS</div>
        <div class="value" id="kpi-nps">—</div>
        <div class="delta" id="kpi-nps-delta"></div>
      </div>
    </section>

    <div class="charts">
      <div class="panel">
        <h2>Тижневий тренд</h2>
        <div class="chart-box tall">
          <canvas id="lineChart" aria-label="Лінійний графік"></canvas>
        </div>
      </div>
      <div class="panel">
        <h2>Структура</h2>
        <div class="chart-box">
          <canvas id="pieChart" aria-label="Кругова діаграма"></canvas>
        </div>
      </div>
    </div>

    <footer id="footer-meta">
      Джерело даних: Databricks → JSON у репозиторії. Локальний перегляд файлу може не підвантажити JSON — відкрийте через GitHub Pages.
    </footer>
  </div>

  <script>
    var DEMO = {
      generated_at: null,
      kpi: {
        orders: 12480,
        gmv_k_eur: 284,
        conversion_pct: 4.6,
        nps: 42,
        orders_delta_pct: 8.2,
        gmv_delta_pct: 3.1,
        conversion_delta_pp: -0.2,
        nps_delta: 2
      },
      line: { labels: ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Нд"], values: [1620, 1750, 1690, 1820, 2100, 2340, 1980] },
      pie: { labels: ["Food", "Store", "Інше"], values: [62, 28, 10] }
    };

    function fmtInt(n) {
      return Math.round(Number(n)).toLocaleString("uk-UA");
    }

    function setDelta(el, value, suffix, invert) {
      if (el == null || value == null || value === "") { el.textContent = ""; return; }
      var v = Number(value);
      var up = invert ? v < 0 : v > 0;
      var down = invert ? v > 0 : v < 0;
      el.textContent = (v > 0 ? "+" : "") + v + suffix;
      el.className = "delta" + (up ? " up" : "") + (down ? " down" : "");
    }

    function applyKpi(k) {
      document.getElementById("kpi-orders").textContent = fmtInt(k.orders);
      document.getElementById("kpi-gmv").textContent = "€" + fmtInt(k.gmv_k_eur) + "k";
      document.getElementById("kpi-conv").textContent = Number(k.conversion_pct).toFixed(1) + "%";
      document.getElementById("kpi-nps").textContent = String(Math.round(Number(k.nps)));

      setDelta(document.getElementById("kpi-orders-delta"), k.orders_delta_pct, "% vs мин. період", false);
      setDelta(document.getElementById("kpi-gmv-delta"), k.gmv_delta_pct, "%", false);
      setDelta(document.getElementById("kpi-conv-delta"), k.conversion_delta_pp, " п.п.", true);
      setDelta(document.getElementById("kpi-nps-delta"), k.nps_delta, "", false);
    }

    Chart.defaults.color = "#8b9cb3";
    Chart.defaults.borderColor = "rgba(255,255,255,.08)";

    var lineChart;
    var pieChart;

    function buildCharts(data) {
      var lineCtx = document.getElementById("lineChart");
      var pieCtx = document.getElementById("pieChart");
      if (lineChart) lineChart.destroy();
      if (pieChart) pieChart.destroy();

      lineChart = new Chart(lineCtx, {
        type: "line",
        data: {
          labels: data.line.labels,
          datasets: [{
            label: "Замовлення",
            data: data.line.values,
            borderColor: "#3d8bfd",
            backgroundColor: "rgba(61, 139, 253, 0.15)",
            fill: true,
            tension: 0.35,
            pointRadius: 3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false } },
            y: { beginAtZero: false }
          }
        }
      });

      pieChart = new Chart(pieCtx, {
        type: "doughnut",
        data: {
          labels: data.pie.labels,
          datasets: [{
            data: data.pie.values,
            backgroundColor: ["#3d8bfd", "#34d399", "#a78bfa", "#fb7185", "#fbbf24"],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: "bottom", labels: { boxWidth: 12, padding: 16 } }
          }
        }
      });
    }

    function render(data) {
      if (data.kpi) applyKpi(data.kpi);
      if (data.generated_at) {
        document.getElementById("footer-meta").textContent =
          "Оновлено: " + data.generated_at + " (UTC/сервер Databricks за налаштуванням SQL).";
      }
      buildCharts(data);
    }

    async function load() {
      try {
        var r = await fetch("dashboard-data.json", { cache: "no-store" });
        if (!r.ok) throw new Error("HTTP " + r.status);
        var data = await r.json();
        if (!data.kpi || !data.line || !data.pie) throw new Error("bad shape");
        render(data);
      } catch (e) {
        document.getElementById("subtitle").textContent =
          "Не вдалося завантажити dashboard-data.json — показано демо. Відкрийте через GitHub Pages або запустіть export_dashboard_data.py.";
        render(DEMO);
      }
    }

    load();
  </script>
</body>
</html>
