# Оновлює docs/dashboard-data.json з Databricks і пушить у main (GitHub Pages підхопить файл).
# Потрібен секрет репозиторію: DATABRICKS_TOKEN (Personal Access Token з Databricks).
name: Update dashboard data

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r databricks-dbx/requirements.txt

      - name: Export JSON from Databricks
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python scripts/export_dashboard_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard-data.json
          if git diff --staged --quiet; then
            echo "No changes to dashboard-data.json"
            exit 0
          fi
          git commit -m "chore: refresh dashboard-data.json from Databricks"
          git push
